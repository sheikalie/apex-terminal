# ─────────────────────────────────────────────────────────────────────────────
# APEX · Netlify Configuration
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish = "."          # Serve index.html from the root

# Edge function: mounts the secure API proxy at /api/analyze
[[edge_functions]]
  path     = "/api/analyze"
  function = "analyze"

# Security headers for the frontend
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:"
