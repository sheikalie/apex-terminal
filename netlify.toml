# ─────────────────────────────────────────────────────────────────────────────
# APEX · Netlify Configuration
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish = "."

# Regular serverless function config (Node.js, no 26s hard timeout issue)
[functions]
  directory = "netlify/functions"

# Route /api/analyze to our serverless function
[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "geolocation=(), microphone=(), camera=()"
